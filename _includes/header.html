<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} 홈">
      <span class="brand-mark" aria-hidden="true">F</span>
      <span>{{ site.title }}</span>
    </a>
    <nav class="site-nav" aria-label="주요 메뉴">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' or page.layout == 'post' %} aria-current="page"{% endif %}>글</a>
      <a href="{{ '/tags/' | relative_url }}"{% if page.url == '/tags/' %} aria-current="page"{% endif %}>태그</a>
      <a href="{{ '/archive/' | relative_url }}"{% if page.url == '/archive/' %} aria-current="page"{% endif %}>아카이브</a>
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>소개</a>
      {% unless site.github_username == '' or site.github_username == 'YOUR_USERNAME' %}
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">GitHub<span class="sr-only">(새 창)</span></a>
      {% endunless %}
    </nav>
  </div>
</header>
